<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#C0392B">
<title>응급실 당직표</title>
<link rel="stylesheet" href="../shared/theme.css?v=6495">
<link rel="stylesheet" href="../shared/calendar-grid.css?v=6495">
<link rel="stylesheet" href="../shared/uguide.css?v=6495">
<style>
  :root{ --er:#C0392B; --er-bg:#FCEBEA; }
  header .ico{color:var(--er);}
  h1{color:var(--er) !important;}
  .erm{border:1px solid var(--bd);border-radius:var(--r);background:var(--bg);padding:8px 10px;
       display:flex;align-items:center;gap:9px;cursor:pointer;margin-bottom:5px;transition:box-shadow .12s,border-color .12s;}
  .erm:hover{border-color:var(--er);}
  .erm.sel{border-color:var(--er);box-shadow:0 0 0 2px var(--er-bg);background:var(--er-bg);}
  .erm .avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;
       font-size:14px;font-weight:700;flex:0 0 auto;}
  .erm .avatar img{width:100%;height:100%;object-fit:cover;display:block;}
  .erm .nm{font-weight:600;font-size:15px;margin-right:auto;}
  .erm .sp{font-size:12px;color:var(--text3);}
  .erm .ercolor{margin-left:8px;width:20px;height:20px;border-radius:50%;border:1.5px solid #fff;
       box-shadow:0 0 0 1px var(--bd2);cursor:pointer;flex:0 0 auto;position:relative;overflow:hidden;}
  .erm .ercolor input[type=color]{position:absolute;inset:-4px;width:28px;height:28px;border:0;padding:0;
       opacity:0;cursor:pointer;}
  .erhint{font-size:13px;color:var(--text2);background:var(--er-bg);border-radius:8px;padding:8px 10px;margin-bottom:10px;line-height:1.5;}
  .erhint b{color:var(--er);}
  table.cal td.daycal{cursor:pointer;}
  table.cal td.daycal:hover{outline:2px solid var(--er);outline-offset:-2px;}
  /* ER 당직표는 일요일에도 당직이 있어 요일 칸이 균등해야 함 — 공유 CSS의 일/토 좁은 폭 무효화 */
  table.cal{table-layout:fixed;}
  table.cal col.col-sun, table.cal col.col-sat{width:14.28% !important;}
  .ername{display:block;margin-top:6px;font-size:15px;font-weight:700;
          color:var(--er);background:var(--er-bg);border-radius:6px;padding:4px 6px;text-align:center;
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .erempty{margin-top:6px;font-size:12px;color:var(--text3);text-align:center;}
  .deptpick{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:14px;color:var(--text2);}
  .deptpick select{padding:5px 8px;border:1px solid var(--bd2);border-radius:7px;font-size:14px;font-family:inherit;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="ico">🚑</span>
    <h1 id="pageTitle">응급실 당직표</h1>
  </header>
  <p class="sub">응급의학과 당직표(하루 1명, 24시간). 여기 당직의의 성씨가 각 의사과 스케줄 날짜 옆에 표시됩니다.</p>

  <div class="card nav stickybar" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;">
    <a href="../index.html">← 부서 선택으로</a>
    <span class="deptpick" style="margin-left:14px;">
      응급실 부서: <select id="erDeptSel"></select>
    </span>
    <span style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;">
      <button class="toolbtn b-reset" id="btnReset" title="이 달 당직표 초기화">↺ 이 달 초기화</button>
      <button class="toolbtn b-print" id="btnPrint" title="현재 달 인쇄">🖨 인쇄</button>
    </span>
  </div>

  <div class="layout">
  <div class="main-col">
  <div class="card">
    <div id="printTitle"></div>
    <div class="cal-top-sticky" id="calTopSticky">
    <div class="cal-head">
      <button id="prevM" title="이전 달">‹</button>
      <span class="mlabel" id="mLabel">—</span>
      <button id="nextM" title="다음 달">›</button>
      <button class="today-btn" id="todayB" title="오늘이 있는 달로">오늘</button>
      <span class="spacer" id="calHint"></span>
      <span style="display:inline-flex;align-items:center;gap:4px;margin-left:8px;">
        <button class="toolbtn" id="calNarrow" title="좁게" style="padding:2px 8px">−</button>
        <button class="toolbtn" id="calWide" title="넓게" style="padding:2px 8px">＋</button>
      </span>
    </div>
    </div>
    <table class="cal" id="calTable">
      <colgroup>
        <col class="col-sun"><col><col><col><col><col><col class="col-sat">
      </colgroup>
      <thead>
        <tr><th class="sun">일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th class="sat">토</th></tr>
      </thead>
      <tbody id="calBody"></tbody>
    </table>
  </div>
  </div><!-- /main-col -->

  <div class="side-col">
  <div class="card">
    <div class="phdr"><span>🚑 응급의학과 의사 <span id="rosterCount" style="font-weight:600;color:var(--text3);font-size:14px"></span></span></div>
    <div class="erhint">의사를 <b>클릭해 선택</b>한 뒤, 달력 날짜를 클릭하면 그날 당직으로 배치됩니다. 같은 날 다시 클릭하면 해제. 선택 해제 후 날짜를 클릭해도 비울 수 있습니다.</div>
    <div id="rosterList">
      <div class="empty" style="font-size:14px;color:var(--text3);padding:8px">불러오는 중…</div>
    </div>
  </div>
  </div><!-- /side-col -->
  </div><!-- /layout -->
</div>

<script src="../shared/utils.js?v=6495"></script>
<script src="../shared/calendar-store.js?v=6495"></script>
<script src="../shared/persons-store.js?v=6495"></script>
<script src="../shared/dept-registry.js?v=6495"></script>
<script src="../shared/er-roster-store.js?v=6495"></script>
<script>
/* ============================================================
   er-duty/index.html — 응급실(응급의학과) 당직표 (독립)
   ------------------------------------------------------------
   응급실 = kind='doctor' 부서 1개. 24시간 근무라 하루 1명, 오전/오후·6속성 없음.
   여기서 정한 당직의 성씨가 다른 의사과 스케줄의 날짜 옆에 (성)으로 표시된다.
   - 후보: 응급실로 지정된 부서(ErRosterStore.getDeptId) 소속 의사.
   - 저장: ErRosterStore(dv6_er_roster, {'Y-M-D':personId}) — 독립 저장소.
   - 입력: 좌측 의사 클릭 선택 -> 달력 칸 클릭으로 스탬프.
   ============================================================ */
var MONTH_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
var WD_KO = ['일','월','화','수','목','금','토'];
var _today = new Date();
var viewY = _today.getFullYear();
var viewM = _today.getMonth();
var _selPid = null;
var _erDept = '';

function _doctorDepts(){ return (window.DeptRegistry) ? DeptRegistry.listByKind('doctor') : []; }
function _erMembers(){
  if(!_erDept || !window.PersonsStore) return [];
  return PersonsStore.listByDept(_erDept);
}
function initials(n){ return (n||'?').trim().charAt(0) || '?'; }

function renderDeptSel(){
  var sel=document.getElementById('erDeptSel');
  var depts=_doctorDepts();
  if(!depts.length){ sel.innerHTML='<option value="">(의사과 부서 없음)</option>'; return; }
  sel.innerHTML='<option value="">— 선택 —</option>'+depts.map(function(d){
    return '<option value="'+escapeHtml(d.id)+'"'+(d.id===_erDept?' selected':'')+'>'+escapeHtml(d.name)+'</option>';
  }).join('');
}

function renderRoster(){
  var box=document.getElementById('rosterList');
  var cnt=document.getElementById('rosterCount');
  var mem=_erMembers();
  cnt.textContent='('+mem.length+'명)';
  if(!_erDept){
    box.innerHTML='<div class="empty" style="font-size:14px;color:var(--text3);padding:8px;line-height:1.6">'
      +'위에서 <b>응급실 부서</b>를 먼저 선택하세요.<br>응급의학과 부서가 없으면 부서 선택 화면에서 의사과로 개설하고, 직원관리에서 의사를 배치하세요.</div>';
    return;
  }
  if(!mem.length){
    box.innerHTML='<div class="empty" style="font-size:14px;color:var(--text3);padding:8px">이 부서 소속 의사가 없습니다. 직원관리에서 배치하세요.</div>';
    return;
  }
  box.innerHTML=mem.map(function(p){
    var da=(p.deptAttrs&&p.deptAttrs[_erDept])?p.deptAttrs[_erDept]:{};
    var col=da.color||'#C0392B';
    var sp=da.specialty||'';
    var sel=(p.personId===_selPid);
    return '<div class="erm'+(sel?' sel':'')+'" data-pid="'+escapeHtml(p.personId)+'">'
      +  '<span class="avatar" style="background:'+col+'22;color:'+col+'">'+(p.photo?'<img src="'+escapeHtml(p.photo)+'" alt="">':escapeHtml(initials(p.name)))+'</span>'
      +  '<span class="nm">'+escapeHtml(p.name||'?')+'</span>'
      +  (sp?'<span class="sp">'+escapeHtml(sp)+'</span>':'')
      +  '<label class="ercolor" title="당직표 색 변경" style="background:'+col+'"><input type="color" value="'+col+'" data-pid="'+escapeHtml(p.personId)+'"></label>'
      +  '</div>';
  }).join('');
  Array.prototype.forEach.call(box.querySelectorAll('.erm'), function(el){
    el.addEventListener('click', function(){
      var pid=el.getAttribute('data-pid');
      _selPid=(_selPid===pid)?null:pid;
      renderRoster();
    });
  });
  // 색 선택 — 사람 선택 클릭과 분리(stopPropagation), 변경 시 deptAttrs.color 저장 후 재렌더
  Array.prototype.forEach.call(box.querySelectorAll('.ercolor'), function(lab){
    lab.addEventListener('click', function(e){ e.stopPropagation(); });
    var inp=lab.querySelector('input[type=color]');
    if(inp){
      inp.addEventListener('click', function(e){ e.stopPropagation(); });
      inp.addEventListener('input', function(e){
        e.stopPropagation();
        var pid=inp.getAttribute('data-pid');
        if(pid && window.PersonsStore && PersonsStore.setDeptAttrs){
          PersonsStore.setDeptAttrs(pid, _erDept, { color: inp.value });
          lab.style.background=inp.value;
          renderRoster(); renderCalendar();
        }
      });
    }
  });
}

function renderCalendar(){
  document.getElementById('mLabel').textContent = viewY+'년 '+MONTH_KO[viewM];
  var body=document.getElementById('calBody');
  var total=ndays(viewY, viewM);
  var firstDow=dow(viewY, viewM, 1);
  var isThisMonth=(viewY===_today.getFullYear() && viewM===_today.getMonth());
  var todayD=isThisMonth?_today.getDate():-1;
  // 의사별 색 맵 (deptAttrs[_erDept].color) — 당직 셀 색 구분용
  var colorOf={};
  if(_erDept && window.PersonsStore){
    PersonsStore.listByDept(_erDept).forEach(function(p){
      var da=p.deptAttrs&&p.deptAttrs[_erDept];
      if(da&&da.color) colorOf[p.personId]=da.color;
    });
  }
  function _erColor(pid){ return colorOf[pid] || '#C0392B'; }
  var cells=[];
  for(var i=0;i<firstDow;i++) cells.push(null);
  for(var d=1; d<=total; d++) cells.push(d);
  while(cells.length%7!==0) cells.push(null);

  var html='';
  for(var r=0;r<cells.length;r+=7){
    html+='<tr>';
    for(var c=0;c<7;c++){
      var d2=cells[r+c];
      if(d2==null){ html+='<td class="blank"></td>'; continue; }
      var wd=dow(viewY,viewM,d2);
      var holi=CalendarStore.isHoliday(viewY,viewM+1,d2);
      var hname=holi?CalendarStore.name(viewY,viewM+1,d2):'';
      var cls=['daycal'];
      if(wd===0) cls.push('sun','sund'); if(wd===6) cls.push('sat','satd');
      if(holi) cls.push('holi'); if(d2===todayD) cls.push('today');
      var pid=ErRosterStore.get(viewY,viewM+1,d2);
      var nm=ErRosterStore.name(viewY,viewM+1,d2);
      var inner;
      if(nm){
        var col=_erColor(pid);
        inner='<div class="ername" style="color:'+col+';background:'+col+'1f;">'+escapeHtml(nm)+'</div>';
      } else {
        inner='<div class="erempty">— 미지정 —</div>';
      }
      html+='<td class="'+cls.join(' ')+'" data-day="'+d2+'">'
        +   '<div class="dayhead"><span class="daynum">'+d2+'</span>'
        +   (hname?'<span class="holiname">'+escapeHtml(hname)+'</span>':'')
        +   '</div>'+inner
        + '</td>';
    }
    html+='</tr>';
  }
  body.innerHTML=html;
  document.getElementById('calHint').textContent=total+'일';
  Array.prototype.forEach.call(body.querySelectorAll('td.daycal'), function(td){
    td.addEventListener('click', function(){ stampDay(parseInt(td.getAttribute('data-day'),10)); });
  });
}

function stampDay(d){
  if(!_erDept){ alert('먼저 응급실 부서를 선택하세요.'); return; }
  var cur=ErRosterStore.get(viewY, viewM+1, d);
  if(_selPid){
    if(cur===_selPid) ErRosterStore.set(viewY, viewM+1, d, '');
    else ErRosterStore.set(viewY, viewM+1, d, _selPid);
  } else {
    if(cur) ErRosterStore.set(viewY, viewM+1, d, '');
  }
  renderCalendar();
}

function shiftMonth(delta){
  viewM+=delta;
  if(viewM<0){ viewM=11; viewY--; } else if(viewM>11){ viewM=0; viewY++; }
  renderCalendar();
}

var _CAL_W_KEY='cal_wrap_width_er', _CAL_W_STEPS=[1000,1200,1400,1600,1900], _CAL_W_DEFAULT=1400;
function _applyCalWidth(px){ document.documentElement.style.setProperty('--wrap-w', px+'px'); try{localStorage.setItem(_CAL_W_KEY,String(px));}catch(_){}}
function _curCalWidth(){ var v=0; try{v=parseInt(localStorage.getItem(_CAL_W_KEY),10);}catch(_){ } return (v&&!isNaN(v))?v:_CAL_W_DEFAULT; }
function _stepCalWidth(dir){ var cur=_curCalWidth(),i=_CAL_W_STEPS.indexOf(cur); if(i<0){i=2;} i=Math.max(0,Math.min(_CAL_W_STEPS.length-1,i+dir)); _applyCalWidth(_CAL_W_STEPS[i]); }

function printCalendar(){
  var t=document.getElementById('printTitle');
  var dn=(_erDept&&DeptRegistry.get(_erDept))?DeptRegistry.get(_erDept).name:'응급실';
  if(t) t.textContent=dn+' 당직표 — '+viewY+'년 '+MONTH_KO[viewM];
  _fitPrintScale(); window.print();
}
function _fitPrintScale(){
  try{
    var tbl=document.getElementById('calTable'), title=document.getElementById('printTitle');
    if(!tbl){ document.documentElement.style.setProperty('--print-scale','1'); return; }
    var MM=3.7795, availW=(297-12)*MM, availH=(210-12)*MM;
    var cw=tbl.scrollWidth, ch=tbl.scrollHeight+(title?title.offsetHeight+8:0);
    if(cw<=0||ch<=0){ document.documentElement.style.setProperty('--print-scale','1'); return; }
    var scale=Math.max(Math.min(availW/cw,availH/ch,1),0.3);
    document.documentElement.style.setProperty('--print-scale', scale.toFixed(3));
  }catch(e){ document.documentElement.style.setProperty('--print-scale','1'); }
}

function resetMonth(){
  if(!confirm((viewM+1)+'월 응급실 당직표를 모두 지웁니다.\n계속할까요?')) return;
  var total=ndays(viewY,viewM);
  for(var d=1; d<=total; d++) ErRosterStore.set(viewY, viewM+1, d, '');
  renderCalendar();
}

if(window.CalendarStore && CalendarStore.load) CalendarStore.load();
_erDept = ErRosterStore.getDeptId() || '';
if(_erDept && (!DeptRegistry.get(_erDept) || DeptRegistry.get(_erDept).kind!=='doctor')) _erDept='';
if(!_erDept){ var dd=_doctorDepts(); if(dd.length===1){ _erDept=dd[0].id; ErRosterStore.setDeptId(_erDept); } }
_applyCalWidth(_curCalWidth());
renderDeptSel();
renderRoster();
renderCalendar();

document.getElementById('erDeptSel').addEventListener('change', function(){
  _erDept=this.value; _selPid=null;
  ErRosterStore.setDeptId(_erDept);
  renderRoster(); renderCalendar();
});
document.getElementById('prevM').addEventListener('click', function(){ shiftMonth(-1); });
document.getElementById('nextM').addEventListener('click', function(){ shiftMonth(1); });
document.getElementById('todayB').addEventListener('click', function(){ viewY=_today.getFullYear(); viewM=_today.getMonth(); renderCalendar(); });
document.getElementById('btnPrint').addEventListener('click', printCalendar);
document.getElementById('btnReset').addEventListener('click', resetMonth);
document.getElementById('calNarrow').addEventListener('click', function(){ _stepCalWidth(-1); });
document.getElementById('calWide').addEventListener('click', function(){ _stepCalWidth(1); });
</script>
<script>
window.UGUIDE_ITEMS = [{
  icon:'🚑', title:'응급실 당직표 사용 가이드',
  html:'<p><b>응급실 부서 선택</b> — 상단에서 응급의학과 부서를 고르면 그 소속 의사가 왼쪽에 나옵니다.</p>'
    +'<p><b>당직 배치</b> — 왼쪽에서 의사를 클릭해 선택한 뒤, 달력 날짜를 클릭하면 그날 당직으로 찍힙니다(하루 1명, 24시간). 같은 날 다시 클릭하면 해제.</p>'
    +'<p><b>공유</b> — 여기 당직의 성씨가 내과계·외과계 등 다른 의사과 스케줄의 날짜 옆에 자동 표시됩니다.</p>'
}];
</script>
<script src="../shared/uguide.js?v=6495"></script>
<script src="../shared/version.js?v=6495"></script>
</body>
</html>
