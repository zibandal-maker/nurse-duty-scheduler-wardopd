<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비교대 근무표 (M2 개발 중)</title>
<link rel="stylesheet" href="../shared/theme.css">
<link rel="stylesheet" href="../shared/calendar-grid.css">
<link rel="stylesheet" href="../shared/uguide.css">
<style>
  /* ── 의사 6속성 셀 전용 (달력형·명단형 공유) ── */
  /* 달력 칸: 응급실 당직 + 의사 칩 목록 */
  .ercall{font-size:11px;font-weight:700;color:var(--primary-d);background:#eaf3fc;
          border-radius:5px;padding:1px 5px;margin:2px 0;display:inline-block;}
  .docwrap{display:flex;flex-direction:column;gap:2px;margin-top:2px;}
  .docchip{display:flex;align-items:center;flex-wrap:wrap;gap:3px;font-size:12px;
           border-radius:4px;padding:1px 4px;line-height:1.5;cursor:pointer;}
  .docchip:hover{outline:1.5px solid var(--primary);}
  .docchip.dim{opacity:.55;}
  .docchip .dname{font-weight:600;}
  .docchip .ddn{font-weight:800;}
  .docchip .dmemo{font-size:10px;color:var(--text3);}
  .db{font-size:9px;font-weight:700;line-height:1.3;min-width:13px;text-align:center;
      padding:0 2px;border-radius:3px;border:1px solid;}
  /* 명단형 셀: 6속성 배지 */
  td.sheetcell{cursor:pointer;text-align:center;vertical-align:middle;min-width:38px;height:34px;}
  td.sheetcell:hover{outline:2px solid var(--primary);outline-offset:-2px;}
  td.sheetcell.dim{opacity:.55;}
  .sheetbadges{display:inline-flex;align-items:center;gap:2px;flex-wrap:wrap;justify-content:center;}
  .sheetbadges .ddn{font-size:13px;font-weight:800;}
  .sheetbadges .dmemo{font-size:8px;color:var(--text3);}
  td.sheetcell .empty{color:var(--text3);}
  /* 셀 편집 모달 행 */
  .modal-body .erow{display:grid;grid-template-columns:64px 1fr;gap:8px;padding:11px 18px;
       border-bottom:1px solid var(--line);align-items:center;}
  .modal-body .erow:last-child{border-bottom:none;}
  .modal-body .elbl{font-weight:700;font-size:14px;color:var(--text2);}
  .modal-body .chips{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .modal-body .chip{border:1px solid var(--bd2);background:var(--bg);border-radius:999px;
       padding:4px 12px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);
       font-family:inherit;line-height:1.4;}
  .modal-body .chip.on{border-color:transparent;color:#fff;}
  .modal-body .chip-memo{flex:1;min-width:120px;border:1px solid var(--bd2);border-radius:var(--r);
       padding:6px 10px;font-size:13px;font-family:inherit;box-sizing:border-box;}
  .mh-sub{font-size:13px;color:var(--text2);font-weight:500;margin-left:4px;}
  .modal-foot .clearbtn{border:1px solid var(--bd2);background:var(--bg);color:var(--warn);
       font-weight:600;border-radius:var(--r);padding:7px 14px;cursor:pointer;font-family:inherit;}
  .modal-foot .savebtn{margin-left:auto;border:0;background:var(--primary);color:#fff;
       font-weight:700;border-radius:var(--r);padding:7px 18px;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <span class="ico">🩺</span>
    <h1 id="pageTitle">의사과 스케줄</h1>
  </header>
  <p class="sub" id="pageSub">의사과(내과계·정형·신경외과 등) 근무·당직 스케줄. 인력은 직원관리에서 이 부서로 배치합니다.</p>

  <!-- 상단 툴바 — 스크롤해도 고정 -->
  <div class="card nav stickybar" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;">
    <a href="../index.html">← 부서 선택으로</a>
    <span style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;">
      <a class="toolbtn b-report" href="../er-duty/index.html" title="공유 응급실 당직표 편집" style="text-decoration:none;display:inline-flex;align-items:center;">🚑 응급실 당직표</a>
      <button class="toolbtn b-reset" id="btnReset" title="이 부서 스케줄 초기화">↺ 초기화</button>
      <button class="toolbtn b-print" id="btnPrint" title="현재 달 인쇄">🖨 인쇄</button>
      <button class="toolbtn b-save" id="btnExport" title="JSON 백업 파일로 저장">↑ 백업</button>
      <button class="toolbtn b-event" id="btnImport" title="JSON 백업 불러오기">↓ 복원</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
    </span>
  </div>

  <div class="layout">
  <div class="main-col">
  <!-- M2c: 월 캘린더 그리드 골격 (셀 내용은 M2d에서) -->
  <div class="card">
    <div id="printTitle"></div>
    <div class="cal-top-sticky" id="calTopSticky">
    <div class="cal-head">
      <button id="prevM" title="이전 달">‹</button>
      <span class="mlabel" id="mLabel">—</span>
      <button id="nextM" title="다음 달">›</button>
      <button class="today-btn" id="todayB" title="오늘이 있는 달로">오늘</button>
      <span class="spacer" id="calHint"></span>
      <span style="display:inline-flex;align-items:center;gap:4px;margin-left:8px;">
        <button class="toolbtn" id="calNarrow" title="좁게" style="padding:2px 8px">−</button>
        <button class="toolbtn" id="calWide" title="넓게" style="padding:2px 8px">＋</button>
      </span>
    </div>
    </div>
    <table class="cal" id="calTable">
      <colgroup>
        <col class="col-sun"><col><col><col><col><col><col class="col-sat">
      </colgroup>
      <thead>
        <tr>
          <th class="sun">일</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th class="sat">토</th>
        </tr>
      </thead>
      <tbody id="calBody"></tbody>
    </table>
  </div>

  <!-- 명단형 (의사 × 날짜) — 칸 클릭 시 6속성 편집 모달 -->
  <details class="card" id="sheetWrap2" open style="padding:16px 18px;">
    <summary style="cursor:pointer;font-size:16px;font-weight:600;color:var(--text2);
         text-transform:uppercase;letter-spacing:.04em;list-style:none;">
      📋 명단형 (의사 × 날짜) <span id="sheetMonth" style="text-transform:none;color:var(--primary);font-weight:700;"></span>
    </summary>
    <div style="margin-top:12px;">
      <div style="font-size:13px;color:var(--text3);margin-bottom:8px;">
        칸을 클릭하면 그날 그 의사의 응급콜·시술·협진·휴진·메모를 편집할 수 있습니다.
      </div>
      <div class="sheet-wrap">
        <table class="sheet" id="sheetTable"></table>
      </div>
      <div class="sheet-legend">
        <span><i style="background:#FCF3C4"></i>협진당직</span>
        <span><i style="background:#DCEBFB"></i>내시경</span>
        <span><i style="background:#F7E5CC"></i>휴진</span>
        <span><i style="background:#C0392B"></i>(X) 금지</span>
        <span>D 주간콜 · N 야간콜</span>
      </div>
    </div>
  </details>

  </div><!-- /main-col -->
  <div class="side-col">
  <!-- B-2: 이 부서 소속 인원 + 간호사 추가 (듀티 디자인 통일) -->
  <div class="card" id="rosterCard">
    <div class="phdr"><span>👥 의사 관리 <span id="rosterCount" style="font-weight:600;color:var(--text3);font-size:14px"></span></span></div>
    <div class="ncards" id="rosterList">
      <div class="empty" style="font-size:14px;color:var(--text3);padding:8px">불러오는 중…</div>
    </div>
    <details id="addDetails" class="addsec-cal">
      <summary>＋ 의사 추가</summary>
      <div style="padding:0 12px 12px;">
        <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px;">직원관리에 등록된 인원 중 선택</label>
        <select id="aPersonSel" style="width:100%;padding:6px;border:1px solid var(--bd2);border-radius:6px;font-size:14px;margin-bottom:6px;"><option value="">— 배치할 사람 선택 —</option></select>
        <label style="font-size:13px;color:var(--text2);display:block;margin-bottom:4px;">세부과목 (선택)</label>
        <select id="aRoleSel" style="width:100%;padding:6px;border:1px solid var(--bd2);border-radius:6px;font-size:14px;margin-bottom:8px;"></select>
        <div style="font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:8px;">새 사람 등록은 <b>직원관리</b>에서. 여기서는 이미 등록된 인원을 이 부서로 배치만 합니다.</div>
        <button id="aAddBtn" style="width:100%;padding:8px;background:var(--primary);color:#fff;border:0;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer;">이 부서에 배치</button>
      </div>
    </details>
  </div>

  </div><!-- /side-col -->
  </div><!-- /layout -->

  <div id="navToolbarSlot"></div>

  <!-- 셀 편집 모달 (의사 1명 × 하루, 6속성) -->
  <div class="modal-bg" id="cellModal">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <h3 id="cmTitle">셀 편집</h3>
        <span class="mh-sub" id="cmSub"></span>
        <span class="mh-holi" id="cmHoli"></span>
        <button class="x" id="cmClose" title="닫기">×</button>
      </div>
      <div class="modal-body">
        <div class="erow"><span class="elbl">응급콜</span>
          <div class="chips" id="cmErCall">
            <button type="button" class="chip" data-v="">없음</button>
            <button type="button" class="chip" data-v="D">D 주간콜</button>
            <button type="button" class="chip" data-v="N">N 야간콜</button>
          </div></div>
        <div class="erow"><span class="elbl">시술</span>
          <div class="chips" id="cmEndo">
            <button type="button" class="chip" data-v="0">없음</button>
            <button type="button" class="chip" data-v="1">내시경</button>
          </div></div>
        <div class="erow"><span class="elbl">협진</span>
          <div class="chips" id="cmConsult">
            <button type="button" class="chip" data-v="0">없음</button>
            <button type="button" class="chip" data-v="1">협진당직</button>
          </div></div>
        <div class="erow"><span class="elbl">금지</span>
          <div class="chips" id="cmBlock">
            <button type="button" class="chip" data-v="0">해제</button>
            <button type="button" class="chip" data-v="1">(X) 콜·협진 금지</button>
          </div></div>
        <div class="erow"><span class="elbl">상태</span>
          <div class="chips" id="cmStatus">
            <button type="button" class="chip" data-v="근무">근무</button>
            <button type="button" class="chip" data-v="휴진">휴진</button>
          </div></div>
        <div class="erow"><span class="elbl">메모</span>
          <div class="chips">
            <input class="chip-memo" id="cmMemo" type="text" maxlength="20" placeholder="투석·외래 등 자유 입력">
          </div></div>
      </div>
      <div class="modal-foot">
        <button class="clearbtn" id="cmClear" type="button">전체 비우기</button>
        <button class="savebtn" id="cmSave" type="button">저장</button>
      </div>
    </div>
  </div>

</div>

<!--
  ────────────────────────────────────────────────────────────────
  [모듈 배선 — M2a]
  비교대 앱은 shared 모듈 중 "진짜 공통"인 것만 가져온다:
    • utils.js          — 날짜·셀키 등 순수 계산 (부서 무관)
    • calendar-store.js — 공휴일 (국가 공통)
    • persons-store.js  — 공유 사람 풀 (부서 무관 인사 정보)

  ★ ward-context.js 는 가져오지 않는다.
    이유: 그 파일은 WARD_ID='duty' 를 하드코딩하고, 로드 즉시 '듀티 마이그레이션'을
    실행하는 *듀티 전용* 부품이다. 비교대가 끌어 쓰면 자기를 듀티로 착각하거나
    듀티 데이터 이전 로직을 잘못 건드릴 수 있다.
    → 비교대는 자기 WARD_ID('outpatient')를 아래에서 직접 선언하고,
      키 규칙(base_wardId)만 동일 규약으로 자체 보유한다. (작은 중복 < 잘못된 결합)
  ────────────────────────────────────────────────────────────────
-->
<script src="../shared/utils.js"></script>
<script src="../shared/calendar-store.js"></script>
<script src="../shared/persons-store.js"></script>
<script src="../shared/dept-registry.js"></script>
<script src="../shared/outpatient-adapter.js"></script>
<script src="../shared/er-roster-store.js"></script>
<script src="./doc-schedule-store.js"></script>
<script src="./doc-render.js"></script>

<script>
/* ── 비교대 부서 컨텍스트 (자체 선언, ward-context 미사용) ──
   WARD_ID 는 저장 키 접두사로 쓰인다: cal_*_<deptId>
   키 규칙은 듀티와 동일 규약(base + '_' + wardId)을 유지해 향후 통합이 쉽게.
   ── M5b: 다중 외래 부서 ──
   WARD_ID 를 URL ?dept=<id> 에서 받아 부서별 근무표를 그린다(한 파일 다부서).
   레지스트리(DeptRegistry)에 없는 dept 면 안내 화면. dept 없으면 대시보드로 유도.   */
function _getDeptFromURL(){
  try {
    var p = new URLSearchParams(location.search);
    return p.get('dept') || '';
  } catch(_){ return ''; }
}
var WARD_ID = _getDeptFromURL();   // 예: 'doctor_1' (URL ?dept=doctor_1)
window.DOC_DEPT_ID = WARD_ID;       // doc-schedule-store 저장 키 접두 (doc_sched_<id>)
var WARD_NAME = '';                 // 표시용 부서명 (레지스트리에서)
(function _resolveWard(){
  if(!WARD_ID) return;  // 무효 진입은 부팅 후 _guardDept()에서 안내
  var rec = (window.DeptRegistry && DeptRegistry.get) ? DeptRegistry.get(WARD_ID) : null;
  if(rec) WARD_NAME = rec.name;
})();
function calKey(base){ return base + '_' + WARD_ID; }   // 예: calKey('cal_sched') → 'cal_sched_outpatient_1'

/* ── M2a 자가진단: 배선이 됐는지만 확인 (데이터 변경 없음) ── */

/* ── M2b: 공유 풀 → 인력 명단 렌더 (읽기 전용) ──
   PersonsStore.list() = [{personId, name, birthday}]
   정렬: 이름 가나다순(한국어 로캘). 빈 풀이면 안내 문구.                         */
function initials(name){
  if(!name) return '?';
  // 한글이면 첫 글자, 영문이면 첫 글자 대문자
  return name.trim().charAt(0).toUpperCase();
}
function fmtBirthday(b){
  if(!b) return '';
  // 'YYYY-MM-DD' → 'MM/DD' 정도로 가볍게 (없으면 빈칸)
  var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(b);
  return m ? (m[2]+'/'+m[3]) : b;
}
function renderRoster(){
  var listEl  = document.getElementById('rosterList');
  var countEl = document.getElementById('rosterCount');
  var people = (window.OutpatientAdapter)
               ? OutpatientAdapter.listMembers(WARD_ID)
               : (window.PersonsStore ? PersonsStore.listByDept(WARD_ID) : []);
  if(countEl) countEl.textContent = '('+people.length+'명)';
  if(people.length === 0){
    listEl.innerHTML = '<div class="empty" style="font-size:14px;color:var(--text3);padding:10px;line-height:1.5">'
      + '아직 이 부서 소속 의사가 없습니다.<br>아래 “＋ 의사 추가”로 직원관리에 등록된 인원을 배치하세요.</div>';
  } else {
    listEl.innerHTML = people.map(function(p){
      var da = (p.deptAttrs && p.deptAttrs[WARD_ID]) ? p.deptAttrs[WARD_ID] : {};
      var spec = da.specialty || '';
      var col = da.color || '#1A8C62';
      var sel = (_editMemberPid === p.personId);
      var dragAttrs = sel ? '' :
        ' draggable="true"'
        + ' ondragstart="onMemberDragStart(event,\''+p.personId+'\')"'
        + ' ondragover="onMemberDragOver(event,\''+p.personId+'\')"'
        + ' ondrop="onMemberDrop(event,\''+p.personId+'\')"'
        + ' ondragleave="onMemberDragLeave(event)"'
        + ' ondragend="onMemberDragEnd(event)"';
      return '<div class="ncard'+(sel?' sel2':'')+'" id="oc-'+p.personId+'"'+dragAttrs+'>'
        + '<div class="nct">'
        +   '<span class="drag-handle" title="'+(sel?'편집 중 순서변경 불가':'드래그로 순서 변경')+'" onclick="event.stopPropagation()">⠿</span>'
        +   '<span class="navatar-ph" style="background:'+col+'22;color:'+col+'" onclick="outToggleEdit(\''+p.personId+'\')">'+escapeHtml(initials(p.name))+'</span>'
        +   '<span class="ni2" onclick="outToggleEdit(\''+p.personId+'\')">'
        +     '<span class="ncn">'+escapeHtml(p.name||'(이름없음)')
        +       (spec?'<span class="rbadge">'+escapeHtml(spec)+'</span>':'')
        +       (_isBirthdayMonth(p.birthday)?'<span title="이달 생일">🎂</span>':'')
        +     '</span>'
        +   '</span>'
        + '</div>'
        + (sel ? '<div class="nce">'+_memberEditPanel(p)+'</div>' : '')
        + '</div>';
    }).join('');
    _bindMemberEdit();
  }
  _renderAddNurseUI();
}

/* ── A-3/A-4: 소속 인원 부서특성 편집 (직급·임산부·색·요일고정) ── */
var _editMemberPid = null;
var WD_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];
var WD_LABELS = ['일','월','화','수','목','금','토'];

function outToggleEdit(pid){
  _editMemberPid = (_editMemberPid===pid) ? null : pid;
  renderRoster();
}
// 간호사 순서 조정 — 드래그 앤 드롭 (듀티 패턴). manualOrder 재부여.
var _cardDragSrc = null;
function onMemberDragStart(e, pid){
  _cardDragSrc = pid;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(function(){
    var el=document.getElementById('oc-'+pid);
    if(el) el.classList.add('dragging-card');
  },0);
}
function onMemberDragOver(e, pid){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  if(_cardDragSrc===pid) return;
  Array.prototype.forEach.call(document.querySelectorAll('#rosterList .ncard'), function(el){ el.classList.remove('drag-over','drag-over-bottom'); });
  var el=document.getElementById('oc-'+pid);
  if(!el) return;
  // 커서가 카드 상반부면 '위에 삽입', 하반부면 '아래에 삽입' 표시
  var r=el.getBoundingClientRect();
  var before = (e.clientY < r.top + r.height/2);
  el.classList.add(before ? 'drag-over' : 'drag-over-bottom');
}
function onMemberDragLeave(e){
  var el=e.currentTarget;
  if(el) el.classList.remove('drag-over','drag-over-bottom');
}
function onMemberDragEnd(e){
  Array.prototype.forEach.call(document.querySelectorAll('#rosterList .ncard'), function(el){
    el.classList.remove('drag-over','drag-over-bottom','dragging-card');
  });
  _cardDragSrc=null;
}
function onMemberDrop(e, pid){
  e.preventDefault();
  e.stopPropagation();
  var dropEl=document.getElementById('oc-'+pid);
  // 드롭 위치(위/아래) 판정 — 정리 전에 먼저 계산
  var before = true;
  if(dropEl){
    var r=dropEl.getBoundingClientRect();
    before = (e.clientY < r.top + r.height/2);
  }
  Array.prototype.forEach.call(document.querySelectorAll('#rosterList .ncard'), function(el){

  });
}
function outSetFWWeek(pid, wk, n, on){
  _setDeptAttr(pid, function(da){

    var cur=_normFW(da.attributes.fixedWeekday[wk]) || {am:'',pm:'',weeks:[]};
    var idx=cur.weeks.indexOf(n);
    if(on && idx<0) cur.weeks.push(n);
    else if(!on && idx>=0) cur.weeks.splice(idx,1);
    cur.weeks.sort(function(a,b){return a-b;});
    da.attributes.fixedWeekday[wk]=cur;
  });
}

function _isBirthdayMonth(bd){

}
function _birthdaysOnDay(d){
  var all = window.PersonsStore ? PersonsStore.list() : [];
  return all.filter(function(p){
    if(!p.birthday || p.membership!==WARD_ID) return false;   // 이 부서 소속만
    var bp=String(p.birthday).split('-');
    return parseInt(bp[1],10)===(viewM+1) && parseInt(bp[2],10)===d;
  });

/* ── 요일고정 v2: 오전/오후 분리 + 주차 선택 ──
   fw[wk] 형태:
     구버전(문자열)  'half'          → {am:'', pm:'half', weeks:[]}  (반차는 오후만)
                      'work'/'off'/'vac' → {am:code, pm:code, weeks:[]}
     신버전(객체)    {am, pm, weeks:[1,3]}   weeks 비면 매주
*/
function _normFW(v){
  if(!v) return null;
  if(typeof v==='string'){
    if(v==='half') return {am:'', pm:'half', weeks:[]};
    return {am:v, pm:v, weeks:[]};
  }
  return { am:v.am||'', pm:v.pm||'', weeks:Array.isArray(v.weeks)?v.weeks.slice():[] };
}
// 주차 기준 옵션: 'occurrence'(기본=그 요일이 그달 처음 도는 날이 1주차) | 'dom'(1일 포함 주가 1주차)
function _weekBasis(){
  try{ return localStorage.getItem('cal_week_basis_'+WARD_ID) || 'occurrence'; }catch(_){ return 'occurrence'; }
}
function _setWeekBasis(v){
  try{ localStorage.setItem('cal_week_basis_'+WARD_ID, v); }catch(_){}
}
// 그 날짜(d)가 자기 요일의 '몇 번째'인지 (1부터). 기준에 따라 계산.
function _weekIndexOfWeekday(y, m, d){
  var basis=_weekBasis();
  if(basis==='dom'){
    // 1일이 포함된 주를 1주차로: 캘린더 주 단위(일요일 시작)
    var firstDow=dow(y,m,1);
    return Math.floor((d + firstDow - 1)/7) + 1;
  }
  // occurrence(기본): 같은 요일이 그달에서 몇 번째로 등장하는지
  return Math.floor((d-1)/7) + 1;
}

/* ── M2c: 월 캘린더 그리드 골격 ──
   ★ month 규약 주의 (함정):
       utils.ndays(y,m)/dow(y,m,d) 는 month 0-based (5월=4) — JS Date 관례.
       CalendarStore.isHoliday(y,m,d)/.name() 는 month 1-based (5월=5).
     → 내부 상태(viewY, viewM)는 0-based 로 통일하고,
       CalendarStore 호출 시에만 (viewM+1) 로 변환한다. (듀티 데이터 호환 위해 0-based 유지)              */
var _today = new Date();
var viewY = _today.getFullYear();
var viewM = _today.getMonth();          // 0-based
var _calOnly = false;                    // renderCalendar 중 renderSheet 재귀 방지
var _sheetPeople = [];                   // 명단형 사람 순서 (현재 미사용, 호환 유지)
var MONTH_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function renderCalendar(){
  var label = document.getElementById('mLabel');
  var body  = document.getElementById('calBody');
  var hint  = document.getElementById('calHint');
  label.textContent = viewY + '년 ' + MONTH_KO[viewM];

  var total   = ndays(viewY, viewM);        // 그 달 일수
  var firstDow = dow(viewY, viewM, 1);      // 1일의 요일 (0=일)
  var isThisMonth = (viewY===_today.getFullYear() && viewM===_today.getMonth());
  var todayD = isThisMonth ? _today.getDate() : -1;

  var cells = [];
  // 앞쪽 빈 칸 (1일 요일만큼)
  for(var i=0;i<firstDow;i++) cells.push(null);
  // 날짜 칸
  for(var d=1; d<=total; d++) cells.push(d);
  // 뒤쪽 빈 칸 (7의 배수로 맞춤)
  while(cells.length % 7 !== 0) cells.push(null);

  // 그 달 근무 데이터 + 사람 이름·색 맵 준비 (M3c)
  var nameOf = {};
  var colorOf = {};
  (window.PersonsStore ? PersonsStore.list() : []).forEach(function(p){
    nameOf[p.personId]=p.name||'';
    var da = p.deptAttrs && p.deptAttrs[WARD_ID];
    if(da && da.color) colorOf[p.personId]=da.color;
  });

  var html = '';
  for(var r=0; r<cells.length; r+=7){
    html += '<tr>';
    for(var c=0; c<7; c++){
      var d2 = cells[r+c];
      if(d2 == null){ html += '<td class="blank"></td>'; continue; }
      var wd = dow(viewY, viewM, d2);                 // 0=일 … 6=토
      var holi = CalendarStore.isHoliday(viewY, viewM+1, d2);   // ★ +1 변환
      var hname = holi ? CalendarStore.name(viewY, viewM+1, d2) : '';
      var cls = ['daycal'];
      if(wd===0) cls.push('sun','sund'); if(wd===6) cls.push('sat','satd');
      if(holi) cls.push('holi');
      if(d2===todayD) cls.push('today');

      html += '<td class="'+cls.join(' ')+'" data-day="'+d2+'">'
            +   '<div class="dayhead"><span class="daynum">'+d2+'</span>'
            +   ((function(){var b=_birthdaysOnDay(d2);return b.length?'<span class="daycake" title="'+escapeHtml(b.map(function(x){return x.name;}).join(', '))+' 생일">🎂</span>':'';})())
            +   (hname ? '<span class="holiname">'+escapeHtml(hname)+'</span>' : '')
            +   ((function(){
                  var evs = CalendarStore.eventsOnDay ? CalendarStore.eventsOnDay(viewY, viewM+1, d2) : [];
                  if(!evs.length) return '';
                  return evs.map(function(e){
                    var c = e.type==='holiday' ? 'var(--warn-d)' : '#185FA5';
                    var icon = e.type==='holiday' ? '🔴' : '📌';
                    return '<span class="dayevt" style="color:'+c+'" title="'+escapeHtml(e.name)+'">'+icon+' '+escapeHtml(e.name)+'</span>';
                  }).join('');
                })())
            +   '</div>'
            +   renderDayStaff(d2)
            + '</td>';
    }
    html += '</tr>';
  }
  body.innerHTML = html;
  hint.textContent = total + '일';
  if(!_calOnly) renderSheet();   // 명단형도 같은 달로 동기화

  // 달력 셀 클릭 → 그날 그 의사 6속성 편집 모달
  Array.prototype.forEach.call(body.querySelectorAll('.docchip'), function(ch){
    ch.style.cursor='pointer';
    ch.addEventListener('click', function(ev){
      ev.stopPropagation();
      var pid=ch.getAttribute('data-pid');
      var d=parseInt(ch.getAttribute('data-day'),10);
      if(pid&&d) openCellEditor(pid, d);
    });
  });

  // 한 날짜 칸의 내용: 응급실 당직(읽기) + 그날 근무/속성 있는 의사 목록
  function renderDayStaff(d){
    if(!window.DocScheduleStore) return '';
    var members = (window.PersonsStore ? PersonsStore.listByDept(WARD_ID) : []);
    // 응급실 당직 성씨 (공유 당직표에서 읽기 전용)
    var erName = (window.ErRosterStore) ? ErRosterStore.name(viewY, viewM+1, d) : '';
    var erHtml = erName
      ? '<div class="ercall" title="응급실 당직: '+escapeHtml(erName)+'">🚑 '+escapeHtml(erName)+'</div>'
      : '';
    if(members.length===0) return erHtml;
    var rows = members.map(function(p){
      var pid=p.personId;
      var cell = DocScheduleStore.get(pid, viewY, viewM, d);
      var v = DocRender.render(cell);
      var isEmpty = !v.text && !cell.memo && !v.badges.length && !v.dim && !v.leftBar;
      if(isEmpty) return '';   // 그날 입력 없는 의사는 칸에 안 보임
      var badges = v.badges.map(function(b){
        var st = DocRender.badgeStyle(b.kind);
        return '<span class="db" style="background:'+st.bg+';color:'+st.fg+';border-color:'+st.bd+'">'+escapeHtml(b.short||b.label)+'</span>';
      }).join('');
      var dn = v.text ? '<span class="ddn" style="color:'+v.textColor+'">'+v.text+'</span>' : '';
      var memo = cell.memo ? '<span class="dmemo">'+escapeHtml(cell.memo)+'</span>' : '';
      var lb = v.leftBar ? 'border-left:3px solid '+v.leftBar+';padding-left:4px;' : '';
      return '<div class="docchip'+(v.dim?' dim':'')+'" data-pid="'+pid+'" data-day="'+d+'" '
        +    'style="background:'+v.bg+';'+lb+'">'
        +    '<span class="dname">'+escapeHtml(nameOf[pid]||p.name||'?')+'</span>'
        +    dn + badges + memo
        +  '</div>';
    }).filter(Boolean);
    return erHtml + (rows.length ? '<div class="docwrap">'+rows.join('')+'</div>' : '');
  }
}

/* ── M2d: 출석부 매트릭스 (사람 × 날짜) ──
   달력과 동일한 viewY/viewM 사용. 명단(PersonsStore)을 세로, 날짜를 가로로.
   각 칸 = 오전/오후 2분할 빈 칸. 토/일/공휴일은 헤더·칸에 색 표시.

          + '이 부서 소속 의사가 없습니다 (좌측 “＋ 의사 추가”로 배치)</td></tr>';
  } else {
    people.forEach(function(p){

        var cell = (window.DocScheduleStore) ? DocScheduleStore.get(pid, viewY, viewM, d2) : null;
        var v = cell ? DocRender.render(cell) : null;
        tbody += '<td class="daycell sheetcell '+ccls+(v&&v.dim?' dim':'')+'" '
              +  'data-pid="'+pid+'" data-day="'+d2+'" '
              +  (v?'style="background:'+v.bg+';'+(v.leftBar?'box-shadow:inset 3px 0 0 '+v.leftBar+';':'')+'"':'')+'>'
              +  _docSheetBadge(cell, v) + '</td>';
      }
      tbody += '</tr>';
    });
  }
  tbody += '</tbody>';
  tbl.innerHTML = thead + tbody;

  // 칸 클릭 → 6속성 편집 모달
  Array.prototype.forEach.call(tbl.querySelectorAll('td.sheetcell'), function(td){

    });
  });

// 명단형 한 칸의 6속성 배지 (작게)
function _docSheetBadge(cell, v){
  if(!cell || !v) return '<span class="empty">·</span>';
  var isEmpty = !v.text && !cell.memo && !v.badges.length && !v.dim && !v.leftBar;
  if(isEmpty) return '<span class="empty">·</span>';
  var out = '';
  if(v.text) out += '<span class="ddn" style="color:'+v.textColor+'">'+v.text+'</span>';
  v.badges.forEach(function(b){
    var st = DocRender.badgeStyle(b.kind);
    out += '<span class="db" style="background:'+st.bg+';color:'+st.fg+';border-color:'+st.bd+'">'+escapeHtml(b.short||b.label)+'</span>';
  });
  if(cell.memo) out += '<span class="dmemo">'+escapeHtml(cell.memo)+'</span>';
  return '<span class="sheetbadges">'+out+'</span>';
}


function shiftMonth(delta){
  viewM += delta;
  if(viewM < 0){ viewM = 11; viewY--; }
  else if(viewM > 11){ viewM = 0; viewY++; }
  renderCalendar();
  renderRoster();   // 이달 생일 케이크 등 월 의존 표시 갱신
  if(typeof applyFixedWeekday==='function') applyFixedWeekday();
}
document.getElementById('prevM').addEventListener('click', function(){ shiftMonth(-1); });
document.getElementById('nextM').addEventListener('click', function(){ shiftMonth(1); });

});

function pad2(n){ return String(n).padStart(2,'0'); }
function exportJSON(){
  try{
    var data = {
      app:'doctor', version:1, exportedAt:new Date().toISOString(),
      wardId: WARD_ID,
      schedule: DocScheduleStore.all(),
      // 인원은 공유 풀이라 참조용 스냅샷만 (복원 시 풀을 덮지 않음)
      personsSnapshot: (window.PersonsStore)? PersonsStore.list() : []
    };
    var blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var url = URL.createObjectURL(blob);
    var now = new Date();
    var ts = now.getFullYear()+pad2(now.getMonth()+1)+pad2(now.getDate())+'_'+pad2(now.getHours())+pad2(now.getMinutes());
    var a = document.createElement('a');
    a.href=url; a.download='의사스케줄_'+viewY+'-'+pad2(viewM+1)+'_'+ts+'.json'; a.click();
    URL.revokeObjectURL(url);
    flashTool('백업 저장 완료 ✓');
  }catch(e){ alert('백업 실패: '+e.message); }
}
function importJSON(evt){
  var file = evt.target.files[0]; if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = JSON.parse(e.target.result);
      if(data.app!=='doctor' || !data.schedule){
        alert('⚠️ 올바른 의사 스케줄 백업 파일이 아닙니다.');
        evt.target.value=''; return;
      }
      var cnt = Object.keys(data.schedule).length;
      if(!confirm('백업을 불러오면 현재 의사 스케줄이 파일 내용으로 교체됩니다.\n'
        +'(셀 '+cnt+'개) 계속할까요?\n\n※ 인원(공유 풀)은 변경되지 않습니다.')){
        evt.target.value=''; return;
      }
      DocScheduleStore.setAll(data.schedule);
      if(window.DocActiveRepo) DocActiveRepo.saveSchedule();
      renderCalendar();
      flashTool('복원 완료 ✓ ('+cnt+'칸)');
    }catch(err){ alert('복원 실패: '+err.message); }
    evt.target.value='';
  };
  reader.readAsText(file);
}
var _toolTimer=null;

  var hint=document.getElementById('calHint');
  var prev=hint.textContent; hint.textContent=msg; hint.style.color='var(--green)';
  clearTimeout(_toolTimer); _toolTimer=setTimeout(function(){ hint.style.color=''; renderCalendar(); }, 2000);
}

/* ── 표 폭 조절 ── */
var _CAL_W_KEY = 'cal_wrap_width_doctor';
var _CAL_W_STEPS = [1000, 1200, 1400, 1600, 1900, 2200, 2600];
var _CAL_W_DEFAULT = 1400;
function _applyCalWidth(px){
  // 화면보다 넓게 지정되면 화면 폭(여백 제외)까지만 — 와이드 모니터를 꽉 채움
  document.documentElement.style.setProperty('--wrap-w', px+'px');
  try{ localStorage.setItem(_CAL_W_KEY, String(px)); }catch(_){}
}
function _curCalWidth(){
  var v = 0; try{ v = parseInt(localStorage.getItem(_CAL_W_KEY),10); }catch(_){}
  return (v && !isNaN(v)) ? v : _CAL_W_DEFAULT;
}
function _stepCalWidth(dir){
  var cur=_curCalWidth();
  var i=_CAL_W_STEPS.indexOf(cur);
  if(i<0){
    i=0; var best=1e9;
    _CAL_W_STEPS.forEach(function(s,idx){ var d=Math.abs(s-cur); if(d<best){best=d;i=idx;} });
  }
  i = Math.max(0, Math.min(_CAL_W_STEPS.length-1, i+dir));
  _applyCalWidth(_CAL_W_STEPS[i]);
}
(function(){
  _applyCalWidth(_curCalWidth());   // 저장된 폭 복원
  var nb=document.getElementById('calNarrow'), wb=document.getElementById('calWide');
  if(nb) nb.addEventListener('click', function(){ _stepCalWidth(-1); });
  if(wb) wb.addEventListener('click', function(){ _stepCalWidth(1); });
})();

// ⑫ 지난달 복사 — 요일 기준 매핑 (날짜 아님). 공휴일 제외, 채워진 칸 보존.
function printCalendar(){
  var deptNm = (window.DeptRegistry && DeptRegistry.get(WARD_ID)) ? DeptRegistry.get(WARD_ID).name
             : (document.getElementById('pageTitle') ? document.getElementById('pageTitle').textContent : '근무표');
  var t=document.getElementById('printTitle');
  if(t) t.textContent = deptNm + ' — ' + viewY + '년 ' + MONTH_KO[viewM] + ' 근무표';
  // 한 장에 들어가도록 축소율 계산 → CSS 변수로 전달
  _fitPrintScale();
  window.print();
}

// 달력 실제 크기 vs A4 가로 인쇄영역을 비교해 1장에 맞는 배율을 --print-scale 에 설정.
function _fitPrintScale(){
  try{
    var card = document.querySelector('.main-col .card');
    var tbl  = document.getElementById('calTable');
    var title= document.getElementById('printTitle');
    if(!tbl) return;
    // A4 가로 인쇄 가능 영역(margin 6mm) ≈ 285mm x 198mm. mm→px(96dpi: 1mm≈3.7795px)
    var MM = 3.7795;
    var availW = (297 - 12) * MM;   // ≈ 1077px
    var availH = (210 - 12) * MM;   // ≈ 748px
    // 콘텐츠 실제 크기(현재 화면 렌더 기준)
    var contentW = tbl.scrollWidth;
    var contentH = tbl.scrollHeight + (title ? title.offsetHeight + 8 : 0);
    if(contentW<=0 || contentH<=0){ document.documentElement.style.setProperty('--print-scale','1'); return; }
    var scale = Math.min(availW/contentW, availH/contentH, 1);
    // 너무 작아지지 않게 하한(가독성) — 그래도 1장 우선이므로 0.3까지 허용
    scale = Math.max(scale, 0.3);
    document.documentElement.style.setProperty('--print-scale', scale.toFixed(3));
  }catch(e){ document.documentElement.style.setProperty('--print-scale','1'); }
}

/* ── 셀 편집 모달 (의사 1명 × 하루, 6속성) ── */
var _editPid=null, _editD=null, _draft=null;

function _chipOnColor(group, val){
  var C=(window.DocRender&&DocRender.COLOR)?DocRender.COLOR:{};
  if(group==='cmErCall'){ if(val==='D') return C.dCall||'#1A8C62'; if(val==='N') return C.nCall||'#5B3FA0'; return '#8a8a86'; }
  if(group==='cmEndo')   return val==='1'?'#3D7FC4':'#8a8a86';
  if(group==='cmConsult')return val==='1'?'#C9A21A':'#8a8a86';
  if(group==='cmBlock')  return val==='1'?(C.blockBar||'#C0392B'):'#8a8a86';
  if(group==='cmStatus') return val==='휴진'?(C.restText||'#9A6618'):'#1A8C62';
  return '#8a8a86';
}
function _syncChips(groupId, selVal){
  var box=document.getElementById(groupId); if(!box) return;
  Array.prototype.forEach.call(box.querySelectorAll('.chip'), function(c){
    var on=(c.getAttribute('data-v')===String(selVal));
    c.className='chip'+(on?' on':'');
    c.style.background=on?_chipOnColor(groupId,c.getAttribute('data-v')):'';
    c.style.color=on?'#fff':''; c.style.borderColor=on?'transparent':'';
  });
}
function _syncAllChips(){
  _syncChips('cmErCall', _draft.erCall||'');
  _syncChips('cmEndo', _draft.endo?'1':'0');
  _syncChips('cmConsult', _draft.consult?'1':'0');
  _syncChips('cmBlock', _draft.block?'1':'0');
  _syncChips('cmStatus', _draft.status||'근무');
}
function openCellEditor(pid, d){
  if(!pid||!d) return;
  _editPid=pid; _editD=d;
  var cell=window.DocScheduleStore.get(pid, viewY, viewM, d);
  _draft={ erCall:cell.erCall||'', endo:!!cell.endo, consult:!!cell.consult,
           block:!!cell.block, status:cell.status||'근무', memo:cell.memo||'' };
  var name=pid;
  (window.PersonsStore?PersonsStore.listByDept(WARD_ID):[]).forEach(function(p){ if(p.personId===pid) name=p.name||pid; });
  document.getElementById('cmTitle').textContent=name;
  document.getElementById('cmSub').textContent=(viewM+1)+'월 '+d+'일 ('+WD_KO[dow(viewY,viewM,d)]+')';
  var holName=(window.CalendarStore&&CalendarStore.isHoliday(viewY,viewM+1,d))?CalendarStore.name(viewY,viewM+1,d):'';
  var er=(window.ErRosterStore)?ErRosterStore.name(viewY,viewM+1,d):'';
  document.getElementById('cmHoli').textContent=(holName?'· '+holName:'')+(er?'  🚑'+er:'');
  document.getElementById('cmMemo').value=_draft.memo;
  _syncAllChips();
  document.getElementById('cellModal').classList.add('open');
}
function _closeCellModal(){ document.getElementById('cellModal').classList.remove('open'); }
function _saveCellModal(){
  _draft.memo=(document.getElementById('cmMemo').value||'').trim();
  window.DocScheduleStore.set(_editPid, viewY, viewM, _editD, _draft);
  var err=window.DocActiveRepo.saveSchedule();
  if(err){ alert('저장 실패: '+err.message); return; }
  _closeCellModal(); renderCalendar();
}
function _clearCell(){
  window.DocScheduleStore.del(_editPid, viewY, viewM, _editD);
  window.DocActiveRepo.saveSchedule();
  _closeCellModal(); renderCalendar();
}
function _bindCellModal(){
  [['cmErCall','erCall',function(v){return v;}],
   ['cmEndo','endo',function(v){return v==='1';}],
   ['cmConsult','consult',function(v){return v==='1';}],
   ['cmBlock','block',function(v){return v==='1';}],
   ['cmStatus','status',function(v){return v;}]
  ].forEach(function(spec){
    var box=document.getElementById(spec[0]); if(!box) return;
    Array.prototype.forEach.call(box.querySelectorAll('.chip'), function(c){
      c.addEventListener('click', function(){
        _draft[spec[1]]=spec[2](c.getAttribute('data-v'));
        _syncChips(spec[0], c.getAttribute('data-v'));
      });
    });
  });
  document.getElementById('cmClose').addEventListener('click', _closeCellModal);
  document.getElementById('cmSave').addEventListener('click', _saveCellModal);
  document.getElementById('cmClear').addEventListener('click', _clearCell);
  document.getElementById('cellModal').addEventListener('click', function(e){ if(e.target===this) _closeCellModal(); });
}

    + '<h1 style="font-size:22px;color:#0C447C;margin:0 0 10px">'+msg+'</h1>'

    + '<a href="../index.html" style="display:inline-block;padding:9px 20px;background:#1E6DBF;'
    + 'color:#fff;border-radius:9px;text-decoration:none;font-weight:600;font-size:16px">← 부서 선택으로</a>'
    + '</div>';
  return false;
